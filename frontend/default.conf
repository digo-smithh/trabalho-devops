server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA: qualquer rota não-arquivo cai no index.html (deixa o React Router decidir)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: tudo que comecar com /api vai pro backend, via DNS interno do Docker.
    # "backend" é o nome do service no docker-compose; o Docker resolve sozinho.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
