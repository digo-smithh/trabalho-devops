
services:
  frontend:
    build: ./frontend
    container_name: garimpo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - garimpo-net

  backend:
    build: ./backend
    container_name: garimpo-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/garimpo-db
      DB_USERNAME: postgres
      DB_PASSWORD: password
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - garimpo-net

  postgres:
    image: postgres:16-alpine
    container_name: garimpo-postgres
    environment:
      POSTGRES_DB: garimpo-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d garimpo-db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - garimpo-net

volumes:
  postgres_data:

networks:
  garimpo-net:
    driver: bridge
